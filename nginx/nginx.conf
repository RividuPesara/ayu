load_module modules/ngx_http_js_module.so;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    js_import /etc/nginx/uid_hash.js;
    js_set $uid_hash uid_hash.extract_uid;

    log_format upstream_log '$remote_addr - [$time_local] "$request" '
                           '$status $body_bytes_sent '
                           'upstream=$upstream_addr uid=$uid_hash';
    access_log /var/log/nginx/access.log upstream_log;

    # SSE streaming sticky routing by Firebase UID
    upstream backend_sticky {
        hash $uid_hash consistent;
        server backend:8000;
        keepalive 32;
    }

    # Everything else load balanced
    upstream backend_pool {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 20M;

        # SSE stream endpoint sticky
        location ~ ^/api/chatbot/sessions/[^/]+/messages/stream$ {
            proxy_pass         http://backend_sticky;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout   300s;
            proxy_read_timeout   300s;
            proxy_buffering      off;
            proxy_cache          off;
        }

        # All other routes load balanced
        location / {
            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout   120s;
            proxy_read_timeout   120s;
        }
    }
}
