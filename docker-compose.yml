services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      - HF_HUB_OFFLINE=1
    volumes:
      - ./backend:/app
      - ./models:/models
      - ./data:/data
    networks:
      - app-network
    restart: unless-stopped
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 300s

networks:
  app-network:
    driver: bridge
